<!doctype html>
<html>
  <head>
    <title>TEAM HORCRUX Compressor</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <h1>TEAM HORCRUX</h1>
      <h2>Professional File Compressor</h2>

      <input type="file" id="fileInput" />

      <select id="compressionType">
        <option value="lossy">Lossy Compression</option>
        <option value="lossless">Lossless Compression</option>
      </select>

      <button id="compressBtn">Compress File</button>
      <div class="progress-box">
        <div id="progressBar"></div>
      </div>

      <div id="result"></div>

      <button id="downloadBtn" style="display: none">
        Download Compressed File
      </button>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
