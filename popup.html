<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TEAM HORCRUX Compressor</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <div class="container">

    <h1>TEAM HORCRUX</h1>
    <h2>Smart File Compressor</h2>

    <input type="file" id="fileInput">

    <select id="compressionType">
      <option value="lossy">Lossy Compression</option>
      <option value="lossless">Lossless Compression</option>
    </select>

    <button id="compressBtn">Compress File</button>

    <div class="progress-box">
      <div id="progressBar"></div>
    </div>

    <div id="result"></div>

    <button id="downloadBtn">Download Compressed File</button>

  </div>

  <script src="popup.js"></script>
</body>
</html>
